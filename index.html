<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cards</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --accent: #4ecdc4;
      --text: #e8edf2;
      --text-muted: #8b9cb3;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(78, 205, 196, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(78, 205, 196, 0.05) 0%, transparent 50%);
      color: var(--text);
      min-height: 100dvh;
      padding: 48px 20px 32px;
    }

    .container {
      width: min(100%, 420px);
      margin: 0 auto;
    }

    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      text-align: center;
      margin-bottom: 32px;
    }

    .list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .list a {
      display: block;
      padding: 18px 22px;
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      color: var(--text);
      text-decoration: none;
      font-size: 1.05rem;
      transition: border-color 0.15s, background 0.15s;
    }

    .list a:hover {
      border-color: rgba(78, 205, 196, 0.35);
      background: #1e2d3d;
    }

    .empty {
      text-align: center;
      color: var(--text-muted);
      padding: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Phrases</h1>
    <ul class="list" id="list"></ul>
  </div>

  <script>
    function deckLabel(id) {
      const label = id.replace(/_/g, ' ');
      return label.charAt(0).toUpperCase() + label.slice(1);
    }

    async function loadDecks() {
      const listEl = document.getElementById('list');

      try {
        const response = await fetch('words/index.json');
        if (!response.ok) throw new Error();
        const decks = await response.json();

        listEl.innerHTML = decks.map((id) =>
          `<li><a href="deck.html?deck=${encodeURIComponent(id)}">${deckLabel(id)}</a></li>`
        ).join('');
      } catch {
        listEl.innerHTML = '<li class="empty">Could not load phrase list</li>';
      }
    }

    loadDecks();
  </script>
</body>
</html>
