<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lessons</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bg: #0f1419;
      --surface: #1a2332;
      --accent: #4ecdc4;
      --text: #e8edf2;
      --text-muted: #8b9cb3;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      background-image:
        radial-gradient(ellipse at 20% 20%, rgba(78, 205, 196, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(78, 205, 196, 0.05) 0%, transparent 50%);
      color: var(--text);
      min-height: 100dvh;
      padding: 48px 20px 32px;
    }

    .container {
      width: min(100%, 480px);
      margin: 0 auto;
    }

    .brand {
      text-align: center;
      margin-bottom: 28px;
    }

    .brand h1 {
      font-size: 1.05rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .brand p {
      font-size: 0.9rem;
      color: var(--text-muted);
      line-height: 1.45;
    }

    .list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .list a {
      display: block;
      padding: 16px 18px;
      background: var(--surface);
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 14px;
      color: var(--text);
      text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
    }

    .list a:hover {
      border-color: rgba(78, 205, 196, 0.35);
      background: #1e2d3d;
    }

    .row-top {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 6px;
    }

    .lesson-id {
      font-size: 0.75rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      flex-shrink: 0;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      font-size: 0.78rem;
      color: var(--text-muted);
    }

    .meta span {
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.04);
      border: 1px solid rgba(255, 255, 255, 0.06);
    }

    .title {
      font-size: 1rem;
      line-height: 1.4;
      font-weight: 500;
    }

    .empty {
      text-align: center;
      color: var(--text-muted);
      padding: 24px;
    }
  </style>
</head>
<body>
  <div class="container">
    <header class="brand">
      <h1 id="project-title">Lessons</h1>
      <p id="project-sub">UA → EN · American English</p>
    </header>
    <ul class="list" id="list"></ul>
  </div>

  <script>
    function padLessonId(id) {
      const n = Number(id);
      if (Number.isFinite(n) && String(id).length < 4) {
        return String(n).padStart(4, '0');
      }
      return String(id);
    }

    async function loadLessons() {
      const listEl = document.getElementById('list');
      const titleEl = document.getElementById('project-title');
      const subEl = document.getElementById('project-sub');

      try {
        const [projectRes, indexRes] = await Promise.all([
          fetch('curriculum/project.json'),
          fetch('curriculum/lessons/main/index.json'),
        ]);

        if (!indexRes.ok) throw new Error('index');

        if (projectRes.ok) {
          const project = await projectRes.json();
          titleEl.textContent = project.title || 'Lessons';
          subEl.textContent = `${project.sourceLang || 'uk'} → ${project.targetLang || 'en-US'} · main track`;
          document.title = project.title || 'Lessons';
        }

        const lessons = await indexRes.json();

        if (!lessons.length) {
          listEl.innerHTML = '<li class="empty">No lessons yet</li>';
          return;
        }

        listEl.innerHTML = lessons.map((lesson) => {
          const id = padLessonId(lesson.id);
          const href = `deck.html?track=${encodeURIComponent(lesson.trackId || 'main')}&lesson=${encodeURIComponent(id)}`;
          const meta = [
            lesson.cefr && `<span>${lesson.cefr}${lesson.band ? ' · ' + lesson.band : ''}</span>`,
            lesson.pairsCount != null && `<span>${lesson.pairsCount} pairs</span>`,
            lesson.targetMinutes != null && `<span>~${lesson.targetMinutes} min</span>`,
          ].filter(Boolean).join('');

          return `
            <li>
              <a href="${href}">
                <div class="row-top">
                  <span class="title">${lesson.title || ('Lesson ' + id)}</span>
                  <span class="lesson-id">#${lesson.lessonId ?? id}</span>
                </div>
                <div class="meta">${meta}</div>
              </a>
            </li>
          `;
        }).join('');
      } catch {
        listEl.innerHTML = '<li class="empty">Could not load lessons. Serve the folder over HTTP and check curriculum/lessons/main/index.json</li>';
      }
    }

    loadLessons();
  </script>
</body>
</html>
